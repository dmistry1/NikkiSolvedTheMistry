<svg xmlns="http://www.w3.org/2000/svg" width="360" height="520" viewBox="0 0 360 520" fill="none">
  <defs>
    <linearGradient id="peacockNeck" x1="157" y1="92" x2="183" y2="286" gradientUnits="userSpaceOnUse">
      <stop stop-color="#123947"/>
      <stop offset=".48" stop-color="#1E6468"/>
      <stop offset="1" stop-color="#3B8A78"/>
    </linearGradient>
    <linearGradient id="peacockTail" x1="89" y1="263" x2="134" y2="514" gradientUnits="userSpaceOnUse">
      <stop stop-color="#2E7169"/>
      <stop offset=".48" stop-color="#6D9C7D"/>
      <stop offset="1" stop-color="#B8CBB0"/>
    </linearGradient>
    <linearGradient id="peacockWing" x1="184" y1="231" x2="269" y2="334" gradientUnits="userSpaceOnUse">
